<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="October logo: rabbit silhouette with moon and red eyes">
  <title>October — rabbit silhouette with moon and red eyes</title>
  <!-- Dark background -->
  <rect width="100%" height="100%" fill="#0b0b0f" />
  <!-- Moon in the background -->
  <defs>
    <radialGradient id="gMoon" cx="35%" cy="25%" r="45%">
      <stop offset="0%" stop-color="#f6f7ee"/>
      <stop offset="70%" stop-color="#e2e4d6"/>
      <stop offset="100%" stop-color="#c9ccb5"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g transform="translate(360,120)">
    <circle r="76" fill="url(#gMoon)" filter="url(#glow)" opacity="0.95" />
    <!-- subtle lunar markings -->
    <ellipse cx="-18" cy="-6" rx="12" ry="8" fill="#ddd" opacity="0.06" />
    <ellipse cx="10" cy="8" rx="8" ry="5" fill="#ddd" opacity="0.04" />
  </g>

  <!-- Rabbit silhouette centered left -->
  <g transform="translate(170,300) scale(1.1 1.1)">
    <!-- body -->
    <path d="M -90 20 C -120 20 -140 -20 -110 -50 C -90 -70 -30 -60 0 -40 C 40 -20 60 10 40 40 C 20 80 -30 80 -60 60 C -80 50 -90 30 -90 20 Z" fill="#09090a" />
    <!-- head -->
    <path d="M 20 -10 C 50 -10 80 10 74 36 C 72 48 60 58 42 56 C 22 54 8 44 0 30 C -6 18 -2 0 20 -10 Z" fill="#09090a" />
    <!-- ears -->
    <path d="M 44 -20 C 56 -70 84 -80 94 -52 C 98 -36 90 -14 72 0 C 62 8 54 -2 44 -20 Z" fill="#09090a" />
    <path d="M 12 -16 C 6 -56 -8 -72 -26 -68 C -34 -66 -30 -42 -18 -22 C -12 -10 -2 -6 12 -16 Z" fill="#09090a" />
    <!-- eye (red) -->
    <circle cx="48" cy="18" r="5.2" fill="#ff2b2b" />
    <circle cx="50" cy="16" r="2.2" fill="#330000" opacity="0.25" />
  </g>

  <!-- subtle foreground vignette -->
  <radialGradient id="v" cx="50%" cy="70%" r="70%">
    <stop offset="60%" stop-color="#000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0.6"/>
  </radialGradient>
  <rect width="100%" height="100%" fill="url(#v)" />
</svg>