<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="360" viewBox="0 0 1000 360">
  <style>text{font-family:Arial,Helvetica,sans-serif;font-size:12px;}</style>
  <rect x="20" y="20" width="220" height="60" rx="8" fill="#fff8e1" stroke="#333"/>
  <text x="40" y="50">Platform-specific browsers</text>

  <rect x="260" y="20" width="320" height="60" rx="8" fill="#e8f8ff" stroke="#333"/>
  <text x="300" y="50">browser/* (Chromium / Firefox / Safari)</text>

  <rect x="600" y="20" width="360" height="60" rx="8" fill="#f0fff4" stroke="#333"/>
  <text x="640" y="50">crypto/keyretriever & crypto primitives</text>

  <rect x="260" y="120" width="700" height="80" rx="8" fill="#fff0f6" stroke="#333"/>
  <text x="300" y="150">filemanager (Session) — copy WAL/SHM, handle locked files</text>
  <text x="300" y="170">output — formatters (csv/json/cookie-editor)</text>

  <rect x="260" y="230" width="220" height="40" rx="8" fill="#f0f9ff" stroke="#333"/>
  <text x="300" y="255">cmd/OctoberStealer — cobra CLI</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333" />
    </marker>
  </defs>
  <line x1="120" y1="80" x2="260" y2="80" stroke="#333" stroke-width="2" marker-end="url(#arr)" />
  <line x1="580" y1="80" x2="600" y2="80" stroke="#333" stroke-width="2" marker-end="url(#arr)" />
  <line x1="520" y1="100" x2="520" y2="120" stroke="#333" stroke-width="2" marker-end="url(#arr)" />
  <line x1="420" y1="200" x2="420" y2="230" stroke="#333" stroke-width="2" marker-end="url(#arr)" />
</svg>